<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стёрка топ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(255,255,255,0.2); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.4); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-400 via-blue-500 to-blue-600 flex items-center justify-center">
    
    <div class="text-center px-4">
        <div class="mb-6">
            <svg class="w-24 h-24 mx-auto text-white/90 drop-shadow-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20.5 7.5l-7-7c-.6-.6-1.5-.6-2.1 0L4.5 7.3c-.6.6-.6 1.5 0 2.1l6.4 6.4 7-7c.6-.6.6-1.5 0-2.1z"/>
                <path d="M4.5 16.5l-2 2c-.6.6-.6 1.5 0 2.1l1.4 1.4c.6.6 1.5.6 2.1 0l2-2-4.5-4.5z"/>
                <path d="M10.5 13.5l-6 6"/>
            </svg>
        </div>
        
        <h1 class="text-6xl md:text-8xl lg:text-9xl font-black text-white glow tracking-tight mb-4">
            Стёрка топ
        </h1>
        
        <p class="text-blue-100 text-xl md:text-2xl font-medium opacity-90 mt-4">
            Он самый ахуенный
        </p>
        
        <div class="mt-8 flex gap-2 justify-center">
            <span class="w-2 h-2 bg-white rounded-full opacity-60 animate-pulse"></span>
            <span class="w-2 h-2 bg-white rounded-full opacity-60 animate-pulse delay-75"></span>
            <span class="w-2 h-2 bg-white rounded-full opacity-60 animate-pulse delay-150"></span>
        </div>
    </div>

</body>
</html>
